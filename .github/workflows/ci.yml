name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          TOOLMESH_CONFIDENCE_THRESHOLD: "0.7"

      - name: Verify seed works
        run: node dist/cli.js seed
        env:
          TOOLMESH_EMBEDDER: hash

      - name: Verify status works
        run: node dist/cli.js status

      - name: Verify link integrity
        run: node dist/cli.js verify
